services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    environment:
      OPENFABLE_DATABASE_URL: "postgresql://openfable:openfable@db:5432/openfable"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: openfable
      POSTGRES_PASSWORD: openfable
      POSTGRES_DB: openfable
    volumes:
      - devpgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openfable -d openfable"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  devpgdata:
